<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Institutional Budgeting App</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">

<div class="p-4">
  <h1 class="text-2xl font-bold mb-4">Institutional Budget Dashboard</h1>

  <!-- Tabs -->
  <div class="mb-4 space-x-2">
    <button onclick="showTab('dashboard')" class="bg-blue-800 text-white px-3 py-1 rounded">Dashboard</button>
    <button onclick="showTab('analytics')" class="bg-gray-700 text-white px-3 py-1 rounded">Analytics</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-blue-900 text-white p-4 rounded">Income: ₹<span id="income">0</span></div>
      <div class="bg-red-700 text-white p-4 rounded">Expense: ₹<span id="expense">0</span></div>
      <div id="netBox" class="p-4 rounded text-white bg-gray-600">
        <span id="netLabel">Net</span>: ₹<span id="net">0</span>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-3 rounded shadow">
        <h2 class="font-bold mb-2">Receipts</h2>
        <div id="receipts"></div>
        <button onclick="addHead('receipts')" class="mt-2 bg-green-600 text-white px-2 py-1 rounded">+ Add</button>
      </div>

      <div class="bg-white p-3 rounded shadow">
        <h2 class="font-bold mb-2">Payments</h2>
        <div id="payments"></div>
        <button onclick="addHead('payments')" class="mt-2 bg-green-600 text-white px-2 py-1 rounded">+ Add</button>
      </div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="hidden">
    <h2 class="font-bold mb-4">BI Overview</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-4 rounded shadow">
        <h3 class="mb-2 font-semibold">Expense Distribution</h3>
        <canvas id="pieChart"></canvas>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h3 class="mb-2 font-semibold">Top Expenses (Sorted)</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>

const defaultData = {
  receipts: [
    "Fees Collection","Bus Fees","Bank Interest","Loans","Charity","CCA Collection","Bus Rent","Auditorium Rent"
  ].map((n,i)=>({name:n,amount:0,id:'r'+i})),
  payments: [
    "Staff Salary","Staff Honorarium","School Events","School Bus","Office Admin","EPF","ESI","Rent to Church","Examination","Charity","Repair & Maint","CCA Payments","Vehicle Loan Interest","Pending Fees","Fees Refund","Gratuity","Capital Expenditure"
  ].map((n,i)=>({name:n,amount:0,id:'p'+i}))
};

let data;

function load(){
  const saved = localStorage.getItem('budgetData');
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultData));
}

function save(){
  localStorage.setItem('budgetData', JSON.stringify(data));
}

function showTab(tab){
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('analytics').classList.add('hidden');
  document.getElementById(tab).classList.remove('hidden');
  if(tab==='analytics') renderCharts();
}

function render(){
  renderList('receipts');
  renderList('payments');
  calculate();
}

function renderList(type){
  const container = document.getElementById(type);
  container.innerHTML = '';

  data[type].forEach(item=>{
    const row = document.createElement('div');
    row.className='flex items-center justify-between border-b py-1 gap-2';

    row.innerHTML = `
      <input value="${item.name}" onchange="editName('${type}','${item.id}',this.value)" class="w-1/2 border px-1">
      <input type="number" value="${item.amount}" onchange="editAmount('${type}','${item.id}',this.value)" class="w-1/3 border px-1">
      <button onclick="del('${type}','${item.id}')" class="text-red-600">✖</button>
    `;

    container.appendChild(row);
  });
}

function editName(type,id,val){
  const item = data[type].find(i=>i.id==id);
  if(item && val.trim()) item.name = val;
  save(); render();
}

function editAmount(type,id,val){
  const num = parseFloat(val);
  if(!isNaN(num) && num>=0){
    const item = data[type].find(i=>i.id==id);
    if(item){ item.amount = num; }
    save(); render();
  }
}

function del(type,id){
  if(confirm('Delete this head?')){
    data[type] = data[type].filter(i=>i.id!=id);
    save(); render();
  }
}

function addHead(type){
  data[type].push({name:'New Head',amount:0,id:Date.now().toString()});
  save(); render();
}

function calculate(){
  const income = data.receipts.reduce((a,b)=>a+b.amount,0);
  const expense = data.payments.reduce((a,b)=>a+b.amount,0);
  const net = Math.abs(income-expense);

  document.getElementById('income').innerText = income;
  document.getElementById('expense').innerText = expense;
  document.getElementById('net').innerText = net;

  const netBox = document.getElementById('netBox');
  const label = document.getElementById('netLabel');

  if(income>expense){
    netBox.className='p-4 rounded text-white bg-green-600';
    label.innerText='Surplus';
  } else if(expense>income){
    netBox.className='p-4 rounded text-white bg-red-600';
    label.innerText='Deficit';
  } else {
    netBox.className='p-4 rounded text-white bg-gray-600';
    label.innerText='Balanced';
  }
}

let pie, bar;
function renderCharts(){
  const labels = data.payments.map(i=>i.name);
  const values = data.payments.map(i=>i.amount);

  if(pie) pie.destroy();
  pie = new Chart(document.getElementById('pieChart'), {
    type:'doughnut',
    data:{labels, datasets:[{data:values}]}
  });

  const sorted = [...data.payments].sort((a,b)=>b.amount-a.amount);

  if(bar) bar.destroy();
  bar = new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{
      labels: sorted.map(i=>i.name),
      datasets:[{data: sorted.map(i=>i.amount)}]
    },
    options:{indexAxis:'y'}
  });
}

// INIT
load();
render();

</script>

</body>
</html>
